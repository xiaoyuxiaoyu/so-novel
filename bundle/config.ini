[global]
# 启动时自动更新 (1 开，0 关)
auto-update = 0
# GitHub 代理加速地址，无法从 GitHub 获取更新时设置
gh-proxy =
# 绕过 Cloudflare 保护的服务地址，用法详见 https://github.com/sarperavci/CloudflareBypassForScraping
cf-bypass =

[download]
# 下载路径
download-path = downloads
# 下载格式 (可选 epub, txt, html, pdf，默认 txt)
extname = txt
# 当下载格式为 txt 时，可设置其编码为 GBK 以兼容旧设备 (默认 UTF-8)
txt-encoding =
# 下载完成后保留章节缓存目录 (1 开，0 关)
preserve-chapter-cache = 0

[source]
# 书籍内容语言 (可选 zh_CN, zh_TW, zh_Hant，默认自动)
language =
# 激活规则文件路径
active-rules = main.json
# 指定当前激活规则中的某个书源，用于指定搜索、批量下载 (填写书源 ID)
source-id =
# 每个书源只显示前 N 条搜索记录 (不指定则为全部)
search-limit = 30
# 优化搜索结果 (过滤低相似度并排序。1 开，0 关)
search-filter = 1

[crawl]
# 并发上限 (默认 50)
concurrency =
# 最小间隔 (毫秒)
min-interval = 200
# 最大间隔 (毫秒)
max-interval = 400
# 启用重试，不启用则下载出错时立即中断 (1 开，0 关)
enable-retry = 1
# 最大重试次数 (针对首次下载失败的章节)
max-retries = 3
# 重试最小间隔 (毫秒)
retry-min-interval = 2000
# 重试最大间隔 (毫秒)
retry-max-interval = 4000

[web]
# 启用 Web 服务 (1 开，0 关)
enabled = 1
# Web 服务端口
port = 7765

[cookie]
# 此处填写 qidian cookie (w_tsfp=xxx) 以获取最新封面
qidian =

[proxy]
# 启用 HTTP 代理 (针对需要代理的书源。1 开，0 关)
enabled = 0
host = 127.0.0.1
port = your port

[remote-backend]
# AI 小说后台域名 (含 scheme，结尾不带斜杠)；查书况与回推章节均走此地址
# 留空时自动走 mock 本地 stub，便于离线开发与联调前回归
# 实际请求路径为 ${base-url}/api/book-collector/web-downloader/{get_book_info|report_chapters|ping}
base-url =
# AI 小说后台接入 API Key；走真实链路时必填
# 接口文档要求请求头 X-Agent-API-Key 携带此值 (与现有 download agent 共用同一把 DOWNLOAD_AGENT_API_KEY)
api-key =
# 连接超时 (毫秒)，默认 5000
connect-timeout-ms = 5000
# 读取超时 (毫秒)，默认 30000；与服务端单请求 30s 上限匹配；toc 抓取另有独立 15000ms 超时，不受此影响
read-timeout-ms = 30000
# 1 = 强制 mock；0 = 走真实 base-url；留空且 base-url 为空时自动 mock
mock =
# 单次回推章节数 > 该阈值时弹窗二次确认，默认 500 (服务端不强制上限，由下载器 UI 承担)
push-batch-warn-threshold = 500
# 单次回推章节数 > 该阈值时直接拒绝，默认 2000
push-batch-reject-threshold = 2000
# 启动期是否调用 /ping 检测；失败仅提示不阻塞启动，默认 1
startup-ping = 1